services:
  mysql:
    image: mysql:8.0
    container_name: prguard-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${PRGUARD_MYSQL_PASSWORD:?set PRGUARD_MYSQL_PASSWORD before starting Docker Compose}"
      MYSQL_DATABASE: pr_guard
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: prguard-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: prguard-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mysql_data:
  redis_data:
  qdrant_data:
