server:
  port: 8080
  mode: debug

logger:
  level: debug
  encoding: console

mysql:
  host: localhost
  port: 13306
  database: pr_guard
  username: root
  password: ""

redis:
  addr: localhost:16379
  password: ""
  db: 0

rate_limit:
  enabled: true
  limit: 100
  window_seconds: 60
  fail_open: true

report_cache:
  enabled: true
  ttl_seconds: 3600

qdrant:
  host: localhost
  port: 6334
  collection_name: pr_guard_code_chunks
  vector_size: 1536
  distance: Cosine
  timeout_seconds: 10

embedding:
  provider: mock
  base_url: ""
  api_key: ""
  model: "mock_embedding"
  dimension: 1536
  timeout_seconds: 10
  batch_size: 16

llm:
  provider: mock
  mock_mode: normal
  mock_delay_ms: 1000
  base_url: ""
  api_key: ""
  model: "mock-llm"
  timeout_seconds: 5
  max_tokens: 1200
  temperature: 0.2

analysis_worker:
  enabled: true
  worker_count: 2
  poll_interval_ms: 500
  task_timeout_seconds: 30
  stale_after_seconds: 60
  max_attempts: 3
  retry_base_seconds: 2
  retry_max_seconds: 8
  retry_jitter_percent: 0

ops:
  enabled: true
  default_page_size: 20
  max_page_size: 100
  default_metrics_window_hours: 24
  max_metrics_window_hours: 168
  query_timeout_seconds: 3
